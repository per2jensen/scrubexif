name: Manual Docker Release

on:
  workflow_dispatch:
    inputs:
      FINAL_VERSION:
        description: 'Release version (e.g. 1.2.3)'
        required: true
        type: string

permissions:
  contents: write
  security-events: write
  pull-requests: write
  id-token: write       # required for cosign keyless signing via GitHub OIDC

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    runs-on: ubuntu-24.04

    env:
      FINAL_VERSION: ${{ inputs.FINAL_VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update and install exiftool
        run: sudo apt-get update && sudo apt-get install -y exiftool libjpeg-turbo-progs

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[test]" --break-system-packages

      - name: Run tests
        run: |
          python3 --version
          exiftool -ver
          make dev-clean
          make test

      - name: Make final version
        run: |
          make FINAL_VERSION=${{ env.FINAL_VERSION }} final
          make FINAL_VERSION=${{ env.FINAL_VERSION }} verify-cli-version
          make FINAL_VERSION=${{ env.FINAL_VERSION }} verify-labels

      - name: Install Syft, Grype and cosign
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
      - uses: sigstore/cosign-installer@v3

      - name: Cache Grype DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/grype/db
          key: grype-db-${{ runner.os }}-${{ hashFiles('**/Dockerfile') }}
          restore-keys: |
            grype-db-${{ runner.os }}-

      - name: Generate SBOM with Syft
        run: syft per2jensen/scrubexif:${{ env.FINAL_VERSION }} -o spdx-json > sbom-${{ env.FINAL_VERSION }}.spdx.json

      - name: Upload SBOM to release assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.FINAL_VERSION }}
          files: sbom-${{ env.FINAL_VERSION }}.spdx.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SBOM artifact, visible in Actions tab
        uses: actions/upload-artifact@v4
        with:
          name: sbom-v${{ env.FINAL_VERSION }}
          path: sbom-${{ env.FINAL_VERSION }}.spdx.json

      - name: Scan image with Grype (fail on high)
        run: grype per2jensen/scrubexif:${{ env.FINAL_VERSION }} --fail-on high -o sarif > grype-results-${{ env.FINAL_VERSION }}.sarif

      - name: Upload Grype SARIF to release assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.FINAL_VERSION }}
          files: grype-results-${{ env.FINAL_VERSION }}.sarif
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Grype SARIF report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grype-report-${{ env.FINAL_VERSION }}
          path: grype-results-${{ env.FINAL_VERSION }}.sarif

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3.28.21
        with:
          sarif_file: grype-results-${{ env.FINAL_VERSION }}.sarif
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker login
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USER_NAME }}" --password-stdin

      - name: Docker push
        run: docker push per2jensen/scrubexif:${{ env.FINAL_VERSION }}

      # Capture the image digest immediately after push so every subsequent step
      # references the immutable digest rather than the mutable tag.
      - name: Capture image digest
        id: image_digest
        run: |
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' \
            per2jensen/scrubexif:${{ env.FINAL_VERSION }})
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT
          echo "Pushed digest: ${DIGEST}"

      # --- cosign: sign the image (keyless, via GitHub OIDC → Sigstore / Rekor) ---
      - name: Sign image with cosign (keyless)
        id: cosign_sign
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          # Sign by digest so the signature is tied to immutable content.
          OUTPUT=$(cosign sign --yes "${{ steps.image_digest.outputs.digest }}" 2>&1)
          echo "${OUTPUT}"

          # Extract the Rekor log index from cosign output and build a browser URL.
          REKOR_INDEX=$(echo "${OUTPUT}" | grep -oP 'tlog entry created with index: \K[0-9]+' || true)
          if [ -n "${REKOR_INDEX}" ]; then
            REKOR_URL="https://search.sigstore.dev/?logIndex=${REKOR_INDEX}"
          else
            REKOR_URL=""
          fi
          echo "rekor_url=${REKOR_URL}" >> $GITHUB_OUTPUT
          echo "rekor_index=${REKOR_INDEX}" >> $GITHUB_OUTPUT
          echo "Rekor entry: ${REKOR_URL}"

      # --- cosign: attach the SBOM as a signed in-toto attestation ---
      - name: Attach SBOM attestation with cosign
        id: cosign_attest
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign attest --yes \
            --predicate sbom-${{ env.FINAL_VERSION }}.spdx.json \
            --type spdxjson \
            "${{ steps.image_digest.outputs.digest }}"

      # --- cosign: write failure badge if signing or attestation failed ---
      - name: Write cosign failure badge
        if: failure() && (steps.cosign_sign.outcome == 'failure' || steps.cosign_attest.outcome == 'failure')
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          python3 scripts/write_cosign_badge.py --failed
          scripts/git_commit_if_changed.sh doc/cosign_badge.json "cosign badge: signing failed for ${{ env.FINAL_VERSION }}"

      # --- cosign: remove image from Docker Hub if signing or attestation failed ---
      - name: Rollback - remove image from Docker Hub (cosign failed)
        if: failure() && (steps.cosign_sign.outcome == 'failure' || steps.cosign_attest.outcome == 'failure')
        env:
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USER_NAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          python3 scripts/remove_dockerhub_tag.py \
            --repo per2jensen/scrubexif \
            --tag ${{ env.FINAL_VERSION }}

      - name: Housekeeping - update readme, index.html, details, clonepulse, and build log
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          # Update version strings in docs (no git ops inside these targets)
          make FINAL_VERSION=${{ env.FINAL_VERSION }} update-details-version
          make FINAL_VERSION=${{ env.FINAL_VERSION }} update-readme-version
          make FINAL_VERSION=${{ env.FINAL_VERSION }} update-index-html-version

          # Update build history log (no git ops inside this target)
          export BUILD_RUNNER="${{ runner.os }}-${{ runner.arch }}"
          export GITHUB_RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          export COSIGN_SIGNED="true"
          export COSIGN_REKOR_URL="${{ steps.cosign_sign.outputs.rekor_url }}"
          export COSIGN_IMAGE_DIGEST="${{ steps.image_digest.outputs.digest }}"
          export SBOM_RELEASE_ASSET_URL="https://github.com/${{ github.repository }}/releases/download/v${{ env.FINAL_VERSION }}/sbom-${{ env.FINAL_VERSION }}.spdx.json"
          make FINAL_VERSION=${{ env.FINAL_VERSION }} log-build-json

          # Update cosign badge
          python3 scripts/write_cosign_badge.py

          # Add clonepulse annotation
          python clonepulse/add_release_annotation.py "${{ env.FINAL_VERSION }}"

          # Single commit for everything changed above
          git add \
            doc/DETAILS.md \
            README.md \
            index.html \
            doc/build-history.json \
            doc/cosign_badge.json \
            clonepulse/fetch_clones.json
          if ! git diff --cached --quiet; then
            git commit -m "release ${{ env.FINAL_VERSION }}: update version strings, build log, cosign badge, clonepulse"
            echo "✅ Housekeeping committed"
          else
            echo "ℹ️ Nothing changed — no housekeeping commit needed"
          fi

          git status
          git push origin HEAD

      - name: Post summary
        run: |
          echo "## ✅ Scrubexif Release v${{ env.FINAL_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Docker image | \`per2jensen/scrubexif:${{ env.FINAL_VERSION }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image digest | \`${{ steps.image_digest.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Cosign signed | ✅ keyless (Sigstore / Rekor) |" >> $GITHUB_STEP_SUMMARY
          echo "| Rekor entry | ${{ steps.cosign_sign.outputs.rekor_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOM | [sbom-${{ env.FINAL_VERSION }}.spdx.json](https://github.com/${{ github.repository }}/releases/download/v${{ env.FINAL_VERSION }}/sbom-${{ env.FINAL_VERSION }}.spdx.json) |" >> $GITHUB_STEP_SUMMARY
          echo "| Grype scan | uploaded to release assets and Security tab |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Verify the signature" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "cosign verify per2jensen/scrubexif:${{ env.FINAL_VERSION }} \\" >> $GITHUB_STEP_SUMMARY
          echo '  --certificate-identity-regexp="https://github.com/${{ github.repository }}" \' >> $GITHUB_STEP_SUMMARY
          echo '  --certificate-oidc-issuer="https://token.actions.githubusercontent.com"' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY


      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.FINAL_VERSION }}
          name: Scrubexif Release v${{ env.FINAL_VERSION }}
          generate_release_notes: false
          body: |
            ## Documentation
            - [What's changed](https://github.com/${{ github.repository }}/blob/main/Changelog.md)
            - [Full documentation](https://github.com/${{ github.repository }}/blob/main/doc/DETAILS.md)
            - [Filename rename spec](https://github.com/${{ github.repository }}/blob/main/doc/rename-spec.md)
            - [Project page](https://per2jensen.github.io/scrubexif/)

            ## Supply chain
            | Artifact | Link |
            |----------|------|
            | SPDX SBOM | attached as release asset |
            | Grype vulnerability scan | attached as release asset + GitHub Security tab |
            | Rekor transparency log | ${{ steps.cosign_sign.outputs.rekor_url }} |

            ## Verify the image signature
            ```bash
                        cosign verify per2jensen/scrubexif:${{ env.FINAL_VERSION }} \
                          --certificate-identity-regexp="https://github.com/${{ github.repository }}" \
                          --certificate-oidc-issuer="https://token.actions.githubusercontent.com"
            ```
          files: |
            sbom-${{ env.FINAL_VERSION }}.spdx.json
            grype-results-${{ env.FINAL_VERSION }}.sarif
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


      - name: Trigger dockerhub-readme workflow
        run: |
          gh workflow run dockerhub-readme.yml \
            --ref ${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
